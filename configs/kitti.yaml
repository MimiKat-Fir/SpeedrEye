# KITTI-style YOLO dataset config.
# Update `path` after placing or mounting the dataset.
# Do not train `DontCare` as a class; filter those labels during conversion.
path: ../data/kitti
train: images/train
val: images/val
test: images/test

names:
  0: Car
  1: Van
  2: Truck
  3: Pedestrian
  4: Person_sitting
  5: Cyclist
  6: Tram
  7: Misc
